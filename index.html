<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <meta name="theme-color" content="#1a1a2e">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-title" content="憨包">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <link rel="manifest" href="manifest.json">
 <link rel="apple-touch-icon" href="icon-192.png">
 <title>憨包桌面小助手 v2.0</title>
 <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
   background: #0d0d1a;
   min-height: 100vh;
   font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
   color: #fff;
   padding: 12px;
  }
  body::before {
   content: '';
   position: fixed;
   top: 0; left: 0; right: 0; bottom: 0;
   background: radial-gradient(ellipse at 30% 10%, rgba(99,102,241,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 90%, rgba(236,72,153,0.04) 0%, transparent 60%);
   pointer-events: none;
   z-index: -1;
  }
  .app {
   max-width: 420px;
   margin: 0 auto;
  }

  /* ========== 顶部 ========== */
  .header {
   display: flex;
   align-items: center;
   gap: 12px;
   padding: 12px 0 16px;
   border-bottom: 1px solid rgba(255,255,255,0.06);
   margin-bottom: 12px;
  }
  .avatar {
   width: 48px; height: 48px;
   border-radius: 50%;
   background: linear-gradient(135deg, #f093fb, #f5576c);
   display: flex; align-items: center; justify-content: center;
   font-size: 22px; font-weight: bold;
   flex-shrink: 0;
   box-shadow: 0 4px 15px rgba(245,87,108,0.4);
   overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .title-area { flex: 1; }
  .title-area h1 { font-size: 17px; font-weight: 700; }
  .title-area h1 span { background: linear-gradient(135deg,#f093fb,#f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .title-area .status { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #4ade80; margin-right: 5px; animation: dotBlink 1.5s infinite; }
  @keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .nav-tabs {
   display: flex; gap: 4px;
   background: rgba(255,255,255,0.05);
   border-radius: 12px; padding: 4px;
   margin-bottom: 12px;
  }
  .nav-tab {
   flex: 1; text-align: center;
   padding: 8px 0;
   border-radius: 10px;
   font-size: 13px;
   cursor: pointer;
   transition: all 0.3s;
   border: none; color: rgba(255,255,255,0.5);
   background: transparent;
   font-family: inherit;
  }
  .nav-tab.active {
   background: rgba(240,147,251,0.2);
   color: #fff;
   font-weight: 600;
  }

  /* ========== 面板通用 ========== */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ========== 对话面板 ========== */
  .message-box {
   background: rgba(255,255,255,0.06);
   border-radius: 14px; padding: 14px 16px;
   margin-bottom: 10px;
   min-height: 70px;
  }
  .message-text { font-size: 14px; line-height: 1.7; text-align: center; color: rgba(255,255,255,0.9); }
  .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .quick-btn {
   padding: 10px; border: none; border-radius: 10px;
   background: rgba(255,255,255,0.07);
   color: #fff; font-size: 13px; cursor: pointer;
   transition: all 0.25s; font-family: inherit;
  }
  .quick-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.12); }
  .quick-btn .e { display: block; font-size: 18px; margin-bottom: 2px; }
  .chat-input-area { display: flex; gap: 8px; }
  .chat-input {
   flex: 1; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.12);
   border-radius: 10px; background: rgba(255,255,255,0.05);
   color: #fff; font-size: 14px; outline: none;
   font-family: inherit;
  }
  .chat-input::placeholder { color: rgba(255,255,255,0.3); }
  .chat-input:focus { border-color: rgba(245,87,108,0.4); }
  .send-btn {
   width: 44px; height: 44px; border: none; border-radius: 10px;
   background: linear-gradient(135deg,#f093fb,#f5576c);
   color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0;
  }
  .send-btn:active { transform: scale(0.93); }

  /* ========== 音乐面板 ========== */
  .music-header {
   display: flex; align-items: center; gap: 10px;
   margin-bottom: 10px;
  }
  .music-header h2 { font-size: 16px; font-weight: 600; }
  .music-header h2 span { color: rgba(255,255,255,0.4); font-weight: 400; }
  .music-search {
   flex: 1;
   padding: 8px 12px; border: 1px solid rgba(255,255,255,0.1);
   border-radius: 8px; background: rgba(255,255,255,0.05);
   color: #fff; font-size: 13px; outline: none;
   font-family: inherit;
  }
  .music-search::placeholder { color: rgba(255,255,255,0.25); }

  .playlist-grid {
   display: grid;
   grid-template-columns: 1fr 1fr;
   gap: 8px;
   max-height: 60vh;
   overflow-y: auto;
   padding-right: 4px;
  }
  .playlist-grid::-webkit-scrollbar { width: 3px; }
  .playlist-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .playlist-card {
   background: rgba(255,255,255,0.04);
   border-radius: 12px;
   padding: 10px;
   cursor: pointer;
   transition: all 0.25s;
   border: 1px solid transparent;
  }
  .playlist-card:active { transform: scale(0.96); border-color: rgba(240,147,251,0.3); }
  .playlist-card .cover {
   width: 100%; aspect-ratio: 1;
   border-radius: 8px;
   background: rgba(255,255,255,0.06);
   margin-bottom: 6px;
   overflow: hidden;
  }
  .playlist-card .cover img { width: 100%; height: 100%; object-fit: cover; }
  .playlist-card .pl-name {
   font-size: 12px; font-weight: 500;
   overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .playlist-card .pl-count {
   font-size: 11px; color: rgba(255,255,255,0.35);
  }

  /* ========== 娱乐面板 ========== */
  .entertain-grid {
   display: grid;
   grid-template-columns: 1fr 1fr;
   gap: 8px;
   margin-bottom: 10px;
  }
  .entertain-card {
   background: rgba(255,255,255,0.04);
   border-radius: 12px; padding: 16px 12px;
   text-align: center;
   cursor: pointer;
   transition: all 0.25s;
   border: 1px solid transparent;
  }
  .entertain-card:active { transform: scale(0.95); border-color: rgba(240,147,251,0.3); }
  .entertain-card .e-title { font-size: 13px; font-weight: 500; }
  .entertain-card .e-desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .entertain-result {
   background: rgba(255,255,255,0.04);
   border-radius: 12px; padding: 14px;
   min-height: 60px;
   text-align: center;
   font-size: 14px;
   line-height: 1.6;
  }

  /* ========== 页脚 ========== */
  .footer {
   margin-top: 12px;
   text-align: center;
   font-size: 11px;
   color: rgba(255,255,255,0.2);
   padding-bottom: 20px;
  }

  /* 标签 */
  .tag {
   display: inline-block;
   padding: 2px 6px;
   border-radius: 4px;
   font-size: 10px;
   margin-left: 4px;
  }
  .tag-wyy { background: rgba(217,36,36,0.2); color: #dd524b; }
  .tag-new { background: rgba(240,147,251,0.2); color: #f093fb; }

  /* ========== B站面板 ========== */
  .bili-header { margin-bottom: 10px; }
  .bili-user {
   display: flex; align-items: center; gap: 12px;
   background: rgba(255,255,255,0.04);
   border-radius: 12px; padding: 12px;
   cursor: pointer;
   transition: all 0.25s;
  }
  .bili-user:active { transform: scale(0.97); background: rgba(255,255,255,0.07); }
  .bili-avatar {
   width: 44px; height: 44px;
   border-radius: 50%;
   background: linear-gradient(135deg, #fb7299, #00a1d6);
   display: flex; align-items: center; justify-content: center;
   font-size: 18px; font-weight: 700;
   flex-shrink: 0;
  }
  .bili-info { flex: 1; }
  .bili-name { font-size: 15px; font-weight: 600; }
  .bili-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  .bili-search-area {
   display: flex; gap: 8px;
   margin-bottom: 10px;
  }
  .bili-search {
   flex: 1; padding: 10px 12px;
   border: 1px solid rgba(255,255,255,0.1);
   border-radius: 8px; background: rgba(255,255,255,0.05);
   color: #fff; font-size: 13px; outline: none;
   font-family: inherit;
  }
  .bili-search::placeholder { color: rgba(255,255,255,0.25); }
  .bili-search:focus { border-color: rgba(251,114,153,0.4); }
  .bili-search-btn {
   padding: 10px 16px; border: none; border-radius: 8px;
   background: linear-gradient(135deg, #fb7299, #00a1d6);
   color: #fff; font-size: 13px; font-weight: 500;
   cursor: pointer; font-family: inherit;
  }
  .bili-search-btn:active { transform: scale(0.95); }

  .bili-links {
   display: grid; grid-template-columns: 1fr 1fr;
   gap: 8px; margin-bottom: 10px;
  }
  .bili-link-card {
   background: rgba(255,255,255,0.04);
   border-radius: 10px; padding: 14px 10px;
   text-align: center;
   cursor: pointer; transition: all 0.25s;
   border: 1px solid transparent;
  }
  .bili-link-card:active { transform: scale(0.95); border-color: rgba(251,114,153,0.3); }
  .bili-link-title { font-size: 13px; font-weight: 500; }
  .bili-link-desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; }

  .bili-hot {
   background: rgba(255,255,255,0.03);
   border-radius: 10px; padding: 12px;
  }
  .bili-hot-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .bili-hot-item {
   display: flex; align-items: center; gap: 8px;
   padding: 6px 0;
   font-size: 12px; cursor: pointer;
   transition: opacity 0.2s;
  }
  .bili-hot-item:active { opacity: 0.6; }
  .bili-hot-rank {
   width: 18px; text-align: center;
   font-weight: 700; font-size: 11px;
   flex-shrink: 0;
  }
  .bili-hot-rank.top3 { color: #fb7299; }
  .bili-hot-text {
   flex: 1;
   overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .bili-bv-area {
   display: flex; gap: 8px;
   margin-bottom: 10px;
  }

  /* ========== 嵌入式播放器浮层 ========== */
  .embed-overlay {
   display: none;
   position: fixed;
   top: 0; left: 0; right: 0; bottom: 0;
   background: rgba(0,0,0,0.75);
   z-index: 1000;
   justify-content: center;
   align-items: center;
   padding: 12px;
  }
  .embed-overlay.active { display: flex; }
  .embed-box {
   width: 100%;
   max-width: 560px;
   max-height: 90vh;
   background: #0d0d1a;
   border-radius: 14px;
   overflow: hidden;
   box-shadow: 0 20px 60px rgba(0,0,0,0.5);
   animation: embedIn 0.3s ease;
  }
  @keyframes embedIn {
   from { opacity: 0; transform: scale(0.92) translateY(20px); }
   to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .embed-header {
   display: flex; align-items: center; justify-content: space-between;
   padding: 10px 14px;
   border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .embed-title { font-size: 14px; font-weight: 600; }
  .embed-close {
   width: 28px; height: 28px; border: none; border-radius: 6px;
   background: rgba(255,255,255,0.08);
   color: #fff; font-size: 12px; cursor: pointer;
   display: flex; align-items: center; justify-content: center;
  }
  .embed-close:active { background: rgba(255,255,255,0.15); }
  .embed-body {
   position: relative;
   width: 100%;
   padding-top: 56.25%; /* 16:9 */
  }
  .embed-body iframe {
   position: absolute;
   top: 0; left: 0; width: 100%; height: 100%;
   border: none;
  }

  /* ========== 视频墙模式 ========== */
  .bili-mode-tabs {
   display: flex; gap: 4px;
   background: rgba(255,255,255,0.05);
   border-radius: 8px; padding: 3px;
   margin-bottom: 10px;
  }
  .bili-mode-tab {
   flex: 1; text-align: center;
   padding: 6px 0;
   border-radius: 6px;
   font-size: 12px;
   cursor: pointer;
   transition: all 0.25s;
   border: none; color: rgba(255,255,255,0.5);
   background: transparent;
   font-family: inherit;
  }
  .bili-mode-tab.active {
   background: rgba(251,114,153,0.25);
   color: #fff;
   font-weight: 600;
  }
  .bili-mode-content { display: none; }
  .bili-mode-content.active { display: block; animation: fadeIn 0.25s ease; }

  /* 视频墙头部 */
  .bili-wall-header {
   display: flex; flex-direction: column; gap: 8px;
   margin-bottom: 10px;
  }
  .bili-wall-tabs {
   display: flex; gap: 6px;
  }
  .bili-wall-tab {
   flex: 1; padding: 8px 0;
   border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
   background: rgba(255,255,255,0.04);
   color: #fff; font-size: 12px; cursor: pointer;
   font-family: inherit; transition: all 0.25s;
  }
  .bili-wall-tab.active {
   background: rgba(251,114,153,0.2);
   border-color: rgba(251,114,153,0.3);
   font-weight: 600;
  }
  .bili-wall-tab:active { transform: scale(0.96); }
  .bili-wall-search {
   padding: 10px 12px;
   border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
   background: rgba(255,255,255,0.05);
   color: #fff; font-size: 13px; outline: none;
   font-family: inherit;
  }
  .bili-wall-search::placeholder { color: rgba(255,255,255,0.25); }
  .bili-wall-search:focus { border-color: rgba(251,114,153,0.4); }

  /* 视频墙网格 */
  .bili-wall-grid {
   display: grid;
   grid-template-columns: 1fr 1fr;
   gap: 10px;
   max-height: 70vh;
   overflow-y: auto;
   padding-right: 4px;
  }
  .bili-wall-grid::-webkit-scrollbar { width: 3px; }
  .bili-wall-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .bili-wall-empty {
   grid-column: 1 / -1;
   text-align: center;
   padding: 40px 0;
   font-size: 13px;
   color: rgba(255,255,255,0.35);
  }

  .bili-wall-card {
   background: rgba(255,255,255,0.04);
   border-radius: 12px;
   overflow: hidden;
   cursor: pointer;
   transition: all 0.25s;
   border: 1px solid transparent;
  }
  .bili-wall-card:active { transform: scale(0.96); border-color: rgba(251,114,153,0.3); }
  .bili-wall-cover {
   width: 100%;
   aspect-ratio: 16/9;
   background: rgba(255,255,255,0.06);
   overflow: hidden;
   position: relative;
  }
  .bili-wall-cover img {
   width: 100%; height: 100%;
   object-fit: cover;
  }
  .bili-wall-cover .bili-wall-dur {
   position: absolute;
   bottom: 4px; right: 4px;
   background: rgba(0,0,0,0.7);
   padding: 1px 5px;
   border-radius: 3px;
   font-size: 10px;
  }
  .bili-wall-info {
   padding: 8px;
  }
  .bili-wall-vtitle {
   font-size: 12px;
   font-weight: 500;
   display: -webkit-box;
   -webkit-line-clamp: 2;
   -webkit-box-orient: vertical;
   overflow: hidden;
   line-height: 1.4;
   margin-bottom: 4px;
  }
  .bili-wall-meta {
   display: flex; gap: 8px;
   font-size: 10px;
   color: rgba(255,255,255,0.35);
  }
  .bili-wall-loading {
   grid-column: 1 / -1;
   text-align: center;
   padding: 20px;
   color: rgba(255,255,255,0.3);
   font-size: 13px;
  }
  .bili-wall-loading::after {
   content: '';
   display: inline-block;
   width: 14px; height: 14px;
   border: 2px solid rgba(255,255,255,0.1);
   border-top-color: #fb7299;
   border-radius: 50%;
   animation: spin 0.8s linear infinite;
   margin-left: 6px;
   vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
 </style>
</head>
<body>
<div class="app" id="app">
 <!-- ===== 头部 ===== -->
 <div class="header">
  <div class="avatar" id="avatarEl">
   <img src="icon-192.png" alt="憨包">
  </div>
  <div class="title-area">
   <h1><span>憨包</span> v2.0</h1>
   <div class="status"><span class="status-dot"></span><span id="statusText">歌单已加载</span></div>
  </div>
 </div>

 <!-- ===== 导航 ===== -->
 <div class="nav-tabs">
  <button class="nav-tab active" data-tab="chat">对话</button>
  <button class="nav-tab" data-tab="music">音乐</button>
  <button class="nav-tab" data-tab="bili">B站</button>
  <button class="nav-tab" data-tab="fun">娱乐</button>
 </div>

 <!-- ===== 对话面板 ===== -->
 <div class="panel active" id="panel-chat">
  <div class="message-box">
   <div class="message-text fade-in" id="messageText">阿鲁卡多大人来啦！今儿想听点啥，还是整点活？</div>
  </div>
  <div class="quick-actions">
   <button class="quick-btn" onclick="quickMsg('整点活')">整点活</button>
   <button class="quick-btn" onclick="quickMsg('来点骚话')">来点骚话</button>
   <button class="quick-btn" onclick="quickMsg('讲个故事')">讲段子</button>
   <button class="quick-btn" onclick="quickMsg('今日运势')">今日运势</button>
  </div>
  <div class="chat-input-area">
   <input class="chat-input" id="chatInput" placeholder="跟憨包说点啥..." maxlength="50" onkeydown="if(event.key==='Enter')sendMsg()">
   <button class="send-btn" onclick="sendMsg()"></button>
  </div>
 </div>

 <!-- ===== 音乐面板 ===== -->
 <div class="panel" id="panel-music">
  <div class="music-header">
   <h2>歌单 <span id="playlistCount">0</span></h2>
   <input class="music-search" id="musicSearch" placeholder="搜歌单..." oninput="filterPlaylists()">
  </div>
  <div class="playlist-grid" id="playlistGrid"></div>
 </div>

 <!-- ===== B站面板 ===== -->
 <div class="panel" id="panel-bili">
  <!-- 模式切换 -->
  <div class="bili-mode-tabs">
   <button class="bili-mode-tab active" data-bili-mode="browse" onclick="switchBiliMode('browse')">浏览</button>
   <button class="bili-mode-tab" data-bili-mode="wall" onclick="switchBiliMode('wall')">视频墙</button>
  </div>

  <!-- ===== 浏览模式 ===== -->
  <div class="bili-mode-content active" id="biliMode-browse">
   <div class="bili-header">
    <div class="bili-user" onclick="embedOpen('https://space.bilibili.com/122627054')">
     <div class="bili-avatar">D</div>
     <div class="bili-info">
      <div class="bili-name">丹德里恩的小曲</div>
      <div class="bili-sub">点击进入个人空间</div>
     </div>
    </div>
   </div>
   <div class="bili-search-area">
    <input class="bili-search" id="biliSearch" placeholder="搜B站视频..." maxlength="50" onkeydown="if(event.key==='Enter')biliSearch()">
    <button class="bili-search-btn" onclick="biliSearch()">搜索</button>
   </div>
   <div class="bili-bv-area">
    <input class="bili-search" id="biliBvInput" placeholder="输入BV号直接播放..." maxlength="20" onkeydown="if(event.key==='Enter')playBv()">
    <button class="bili-search-btn" onclick="playBv()">播放</button>
   </div>
   <div class="bili-links">
    <div class="bili-link-card" onclick="embedOpen('https://space.bilibili.com/122627054/video')">
     <div class="bili-link-title">我的投稿</div>
     <div class="bili-link-desc">嵌入式浏览</div>
    </div>
    <div class="bili-link-card" onclick="embedOpen('https://space.bilibili.com/122627054/favlist')">
     <div class="bili-link-title">我的收藏</div>
     <div class="bili-link-desc">嵌入式浏览</div>
    </div>
    <div class="bili-link-card" onclick="embedOpen('https://www.bilibili.com/v/popular/rank/all')">
     <div class="bili-link-title">热门排行</div>
     <div class="bili-link-desc">嵌入式浏览</div>
    </div>
    <div class="bili-link-card" onclick="embedOpen('https://www.bilibili.com')">
     <div class="bili-link-title">B站首页</div>
     <div class="bili-link-desc">嵌入式浏览</div>
    </div>
   </div>
   <div class="bili-hot" id="biliHot">

function getReply(input) {
 input = input.trim();
 for (let [key, replies] of Object.entries(BOT.keywords)) {
  if (input.includes(key)) {
   return replies[Math.floor(Math.random() * replies.length)];
  }
 }
 return BOT.defaultReplies[Math.floor(Math.random() * BOT.defaultReplies.length)];
}

function setMsg(text) {
 const el = document.getElementById('messageText');
 el.style.opacity = '0';
 el.style.transform = 'translateY(6px)';
 setTimeout(() => {
  el.textContent = text;
  el.style.opacity = '1';
  el.style.transform = 'translateY(0)';
 }, 100);
}

function quickMsg(type) {
 const reply = getReply(type);
 setMsg(reply);
 if (type === '整点活') document.getElementById('statusText').textContent = '正在整活...';
 else if (type === '来点骚话') document.getElementById('statusText').textContent = '骚话模式启动';
 else document.getElementById('statusText').textContent = '待命中';
}

function sendMsg() {
 const input = document.getElementById('chatInput');
 const text = input.value.trim();
 if (!text) return;
 const reply = getReply(text);
 setMsg(`「${text}」\n${reply}`);
 input.value = '';
 document.getElementById('statusText').textContent = '刚聊了一句';
}

// ====== 歌单引擎 ======
let filteredPlaylists = [...PLAYLISTS];

function renderPlaylists(list) {
 const grid = document.getElementById('playlistGrid');
 document.getElementById('playlistCount').textContent = list.length;
 grid.innerHTML = list.map(p => `
  <div class="playlist-card" onclick="openPlaylist(${p.id})">
   <div class="cover">
    <img src="${p.cover}?param=200y200" alt="${p.name}" loading="lazy"
      onerror="this.parentElement.innerHTML='<div style=\\\"width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;color:rgba(255,255,255,0.2)\\\"></div>'">
   </div>
   <div class="pl-name">${p.name}</div>
   <div class="pl-count">${p.count} 首</div>
  </div>
 `).join('');
}

function filterPlaylists() {
 const q = document.getElementById('musicSearch').value.trim().toLowerCase();
 if (!q) {
  filteredPlaylists = [...PLAYLISTS];
 } else {
  filteredPlaylists = PLAYLISTS.filter(p => p.name.toLowerCase().includes(q));
 }
 renderPlaylists(filteredPlaylists);
}

function openPlaylist(id) {
 window.open(`https://music.163.com/#/playlist?id=${id}`, '_blank');

function doCountdown() {
 const now = new Date();
 const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
 const daysLeft = Math.ceil((endOfMonth - now) / (1000*60*60*24));
 const endOfYear = new Date(now.getFullYear(), 11, 31);
 const yearLeft = Math.ceil((endOfYear - now) / (1000*60*60*24));
 document.getElementById('funResult').innerHTML = `
  <div style="margin-bottom:4px"> 现在是 ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日</div>
  <div style="font-size:24px;font-weight:600;margin:6px 0">距月底还有 ${daysLeft} 天</div>
  <div style="font-size:12px;color:rgba(255,255,255,0.4)">距离 ${now.getFullYear()+1} 年还有 ${yearLeft} 天</div>

// 搜B站视频 - 跳转B站搜索结果页
function biliSearch() {
 const q = document.getElementById('biliSearch').value.trim();
 if (!q) return;
 embedOpen('https://search.bilibili.com/all?keyword=' + encodeURIComponent(q), '搜索: ' + q);
}

// BV号播放
function playBv() {
 const bv = document.getElementById('biliBvInput').value.trim();
 if (!bv) return;
 // 智能提取BV号
 const match = bv.match(/[Bb][Vv][0-9a-zA-Z]{10,}/);
 let bvid = match ? match[0].toUpperCase() : bv;
 if (!bvid.startsWith('BV')) { bvid = 'BV' + bvid; }
 document.getElementById('biliBvInput').value = bvid;
 embedVideo('https://player.bilibili.com/player.html?bvid=' + bvid, '播放: ' + bvid);
}

// 嵌入式播放器 - 页面/搜索
function embedOpen(url, title) {
 document.getElementById('embedTitle').textContent = title || 'B站';
 document.getElementById('embedIframe').src = url;
 document.getElementById('embedOverlay').classList.add('active');
 // 防止页面滚动
 document.body.style.overflow = 'hidden';
}

// 嵌入式播放器 - 视频专用
function embedVideo(url, title) {
 document.getElementById('embedTitle').textContent = title || 'B站视频';
 document.getElementById('embedIframe').src = url;
 document.getElementById('embedOverlay').classList.add('active');
 document.body.style.overflow = 'hidden';
}

// 关闭浮层
function embedClose(e) {
 if (e && e.target !== document.getElementById('embedOverlay') && e.target.closest('.embed-box')) return;
 document.getElementById('embedOverlay').classList.remove('active');
 document.getElementById('embedIframe').src = ''; // 停掉视频节省流量
 document.body.style.overflow = '';
}
